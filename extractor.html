<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor de Tablas PDF a Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h2 { color: #1e4620; text-align: center; }
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px dashed #2e7d32;
        }
        input[type="file"] { display: none; }
        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background: #2e7d32;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .custom-file-upload:hover { background: #1b5e20; }
        #status { margin-top: 15px; font-weight: bold; color: #555; }
        .result-section {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        .btn-copy {
            background: #1565c0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            float: right;
            margin-bottom: 10px;
        }
        .btn-copy:hover { background: #0d47a1; }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            white-space: pre;
            overflow-x: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h2>Extractor de Tablas de PDF a formato Excel</h2>
    
    <div class="upload-section">
        <label class="custom-file-upload">
            <input type="file" id="pdf-file" accept=".pdf">
            Seleccionar archivo PDF
        </label>
        <div id="status">Sube un PDF para comenzar la extracción...</div>
    </div>

    <div class="result-section" id="result-container">
        <button class="btn-copy" onclick="copiarAlPortapapeles()">Copiar para Excel</button>
        <h3>Datos detectados (Formato TSV):</h3>
        <p style="font-size: 0.9em; color: #666;">Los datos abajo están separados por tabulaciones. Al copiarlos y pegarlos en Excel, se organizarán automáticamente en celdas.</p>
        <textarea id="output-text" readonly></textarea>
    </div>

    <script>
        // Configurar el worker de PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.getElementById('pdf-file').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            const resultContainer = document.getElementById('result-container');
            const outputText = document.getElementById('output-text');
            
            status.innerText = "Procesando PDF... Por favor, espera.";
            resultContainer.style.display = "none";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullExcelText = "";

                // Recorrer todas las páginas del PDF
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const textContent = await page.getTextContent();
                    
                    if (textContent.items.length === 0) continue;

                    // Tolerancia en píxeles para considerar que el texto está en la misma fila (eje Y)
                    const yTolerancia = 5; 
                    let lineas = {};

                    // Agrupar elementos por su posición vertical (Y)
                    textContent.items.forEach(item => {
                        // El transform[5] representa la coordenada Y en PDF.js
                        const y = Math.round(item.transform[5]); 
                        const x = item.transform[4]; // Coordenada X
                        
                        // Buscar si ya existe una fila cercana en el eje Y
                        let filaEncontrada = Object.keys(lineas).find(key => Math.abs(key - y) <= yTolerancia);
                        
                        if (filaEncontrada) {
                            lineas[filaEncontrada].push({ x: x, text: item.str });
                        } else {
                            lineas[y] = [{ x: x, text: item.str }];
                        }
                    });

                    // Ordenar las filas de arriba hacia abajo (en PDF, Y crece hacia arriba)
                    const filasOrdenadas = Object.keys(lineas).sort((a, b) => b - a);

                    filasOrdenadas.forEach(y => {
                        // Ordenar los elementos de la fila de izquierda a derecha (eje X)
                        let elementos = lineas[y].sort((a, b) => a.x - b.x);
                        
                        // Unir los elementos usando TABULACIONES (\t) que es el estándar que Excel entiende para cambiar de celda
                        let filaTexto = elementos.map(item => item.text.trim()).filter(t => t !== "").join("\t");
                        
                        if (filaTexto.trim() !== "") {
                            fullExcelText += filaTexto + "\n";
                        }
                    });
                }

                if (fullExcelText.trim() === "") {
                    status.innerText = "No se detectó texto estructurado en el PDF. ¿Es un PDF escaneado (imagen)?";
                } else {
                    status.innerText = "¡Conversión completada con éxito!";
                    outputText.value = fullExcelText;
                    resultContainer.style.display = "block";
                }

            } catch (error) {
                console.error(error);
                status.innerText = "Error al procesar el archivo PDF.";
            }
        });

        function copiarAlPortapapeles() {
            const textarea = document.getElementById('output-text');
            textarea.select();
            document.execCommand('copy');
            alert('¡Datos copiados! Abre Excel y presiona Ctrl+V (o Pegar).');
        }
    </script>
</body>
</html>
