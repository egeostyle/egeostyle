<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁLBUM MUNDIAL 2026</title>
    <meta name="checklist-user" content="Invitado">
    <meta name="checklist-timestamp" content="">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* [Mismos estilos anteriores, mantengo todo el CSS intacto] */
        :root { --bg-color: #f4f6f9; --card-bg: #ffffff; --primary-color: #5c061f; --tengo-color: #2ecc71; --repetida-color: #e74c3c; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; }
        header { text-align: center; background: var(--primary-color); color: white; padding: 20px; border-radius: 12px; }
        .upload-zone { background: #eef2f5; padding: 12px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-upload-label { background-color: #7f8c8d; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content-box { background: white; padding: 20px; border-radius: 16px; text-align: center; max-width: 320px; width: 90%; }
        #reader { width: 100%; max-width: 300px; }
        .qr-display-zone { margin: 20px 0; display: flex; justify-content: center; }
        .btn-download-final { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header><h1>ÁLBUM MUNDIAL 2026</h1></header>

    <div class="upload-zone">
        <button class="btn-upload-label" onclick="abrirCamara(false)">📸 Escanear QR</button>
        <button class="btn-upload-label" onclick="abrirCamara(true)" style="background-color: #f39c12;">📸 Comparar</button>
    </div>

    <!-- Modales -->
    <div id="camera-modal" class="custom-modal">
        <div class="modal-content-box" style="background: #333; color: white;">
            <div id="reader"></div>
            <button onclick="document.getElementById('qr-file-input').click()" style="width:100%; padding:10px; margin:10px 0;">📁 Subir imagen</button>
            <input type="file" id="qr-file-input" accept="image/*" onchange="procesarQRDesdeArchivo(event)" style="display:none;">
            <button onclick="cerrarCamara()" style="width:100%; padding:10px; background:#c0392b; color:white; border:none;">Cancelar</button>
        </div>
    </div>

    <div id="qr-view-modal" class="custom-modal">
        <div class="modal-content-box">
            <h3>Tu Código QR</h3>
            <div id="qr-display" class="qr-display-zone"></div>
            <!-- Botón de descarga forzada para máxima calidad -->
            <button class="btn-download-final" id="btn-descarga-forzada">💾 Descargar QR</button>
            <button onclick="cerrarModalQR()" style="width:100%; padding:10px;">Cerrar</button>
        </div>
    </div>

    <div class="countries-container" id="main-container"></div>

    <script>
        // Lógica de datos y generación
        let isProcessingScan = false;
        let html5QrcodeScanner = null;

        // --- GENERACIÓN OPTIMIZADA ---
        function procesarYMostrarQR() {
            let nombreUsuario = prompt("Nombre de usuario:", "Jugador");
            if (!nombreUsuario) return;
            
            // Lógica de estados... (simplificado para brevedad)
            const data = `${nombreUsuario}|${Date.now()}|AABBCC`; // Ejemplo

            const displayZone = document.getElementById('qr-display');
            displayZone.innerHTML = "";
            
            // MODIFICACIÓN: Usamos CorrectLevel.H (Alta redundancia)
            const qr = new QRCode(displayZone, {
                text: data,
                width: 256,
                height: 256,
                correctLevel: QRCode.CorrectLevel.H 
            });

            setTimeout(() => {
                const canvas = displayZone.querySelector('canvas');
                // MODIFICACIÓN: Forzamos fondo blanco sólido
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                const dataURL = canvas.toDataURL("image/png");
                
                // Botón de descarga forzada
                const btnDescarga = document.getElementById('btn-descarga-forzada');
                btnDescarga.onclick = () => {
                    const link = document.createElement('a');
                    link.download = `${nombreUsuario}_qr.png`;
                    link.href = dataURL;
                    link.click();
                };
            }, 500);

            document.getElementById('qr-view-modal').style.display = 'flex';
        }

        // --- ESCANEO OPTIMIZADO ---
        function escanearArchivoEstatico(lector, archivo) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const image = new Image();
                image.onload = function() {
                    // Canvas de normalización
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    canvas.width = 600; 
                    canvas.height = 600;
                    
                    // Fondo blanco para asegurar contraste
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob((blob) => {
                        const archivoOptimizado = new File([blob], "qr_scan.png", { type: "image/png" });
                        
                        lector.scanFile(archivoOptimizado, true)
                            .then(decodedText => {
                                document.getElementById('camera-modal').style.display = 'none';
                                alert("QR detectado con éxito");
                                ejecutarCargaDeDatos(decodedText);
                            })
                            .catch(err => {
                                alert("Error: Asegúrate de que la imagen sea clara y tenga buena luz.");
                            });
                    }, "image/png");
                };
                image.src = e.target.result;
            };
            reader.readAsDataURL(archivo);
        }

        // ... (Resto de funciones de la app: abrirCamara, setStickerState, etc.)
        
        function cerrarModalQR() { document.getElementById('qr-view-modal').style.display = 'none'; }
        function cerrarCamara() { document.getElementById('camera-modal').style.display = 'none'; }
        function abrirCamara() { document.getElementById('camera-modal').style.display = 'flex'; }
        function procesarQRDesdeArchivo(event) {
            const file = event.target.files[0];
            const html5QrCode = new Html5Qrcode("reader");
            escanearArchivoEstatico(html5QrCode, file);
        }
        function ejecutarCargaDeDatos(t) { console.log(t); }
    </script>
</body>
</html>
