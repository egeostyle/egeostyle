<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁLBUM MUNDIAL 2026</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #5c061f; /* Color guinda FIFA */
            --tengo-color: #2ecc71;
            --repetida-color: #e74c3c;
            --falta-color: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 20px 90px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary-color), #8a0f2e);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin: 0 0 10px 0; font-size: 1.8rem; }
        .subtitle { font-size: 1rem; opacity: 0.9; }

        /* Panel de Control de Estadísticas en Fila Única */
        .dashboard-controls {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stats {
            display: flex;
            flex-direction: row !important;
            justify-content: space-between;
            gap: 6px;
            width: 100%;
        }

        .stat-box {
            flex: 1;
            padding: 10px 4px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            font-size: 0.85rem;
            border: 1px solid #ddd;
            white-space: nowrap;
        }
        .stat-box.tengo { background-color: rgba(46, 204, 113, 0.15); color: #27ae60; border-color: rgba(46, 204, 113, 0.3); }
        .stat-box.repetida { background-color: rgba(231, 76, 60, 0.15); color: #c0392b; border-color: rgba(231, 76, 60, 0.3); }
        .stat-box.falta { background-color: rgba(189, 195, 199, 0.2); color: #7f8c8d; }

        /* Botonera Flotante */
        .floating-action-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            backdrop-filter: blur(5px);
            width: calc(100% - 60px);
            max-width: 400px;
            justify-content: center;
        }

        .btn {
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.95); }

        .btn-download { background-color: #2980b9; }
        .btn-pdf { background-color: #27ae60; }

        /* Contenedor Principal de Países */
        .countries-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .country-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .country-title {
            font-size: 1.05rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 12px;
            padding-bottom: 4px;
            border-bottom: 3px solid var(--primary-color);
            color: var(--primary-color);
            display: inline-block;
        }

        /* Grid de Figuritas */
        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 6px;
        }

        .sticker {
            background-color: #f0f3f5;
            border: 2px solid #dcdde1;
            border-radius: 6px;
            padding: 10px 4px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .sticker.state-tengo {
            background-color: var(--tengo-color) !important;
            border-color: #27ae60;
            color: white;
        }

        .sticker.state-repetida {
            background-color: var(--repetida-color) !important;
            border-color: #c0392b;
            color: white;
        }

        .instructions {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
            text-align: center;
            margin-bottom: 15px;
        }

        /* ==========================================================================
           REDiseño de Ultra-Compresión para Impresión / PDF (Ahorro Máximo de Hojas)
           ========================================================================== */
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 6mm; /* Márgenes de página mínimos */
            }
            body { 
                background-color: #fff; 
                padding: 0; 
                font-size: 10px;
            }
            header { 
                background: none !important; 
                color: #000 !important; 
                padding: 0; 
                margin-bottom: 10px; 
                box-shadow: none;
                text-align: left;
            }
            header h1 { font-size: 1.3rem; color: #5c061f; margin: 0; }
            header .subtitle { font-size: 0.85rem; color: #555; }
            
            .dashboard-controls, .instructions, .floating-action-container { display: none !important; } 
            
            /* Súper compresión: Distribución en 3 Columnas */
            .countries-container {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 6px !important;
            }

            .country-card { 
                border: 1px solid #e0e0e0 !important;
                border-radius: 4px !important;
                padding: 5px !important;
                box-shadow: none !important;
                background: #fff !important;
                break-inside: avoid !important; /* Evita que los países se dividan de página */
                margin: 0 !important;
            }

            .country-title { 
                font-size: 0.75rem !important; 
                margin-bottom: 4px !important; 
                padding-bottom: 1px !important;
                border-bottom: 1.5px solid #5c061f !important; 
                display: block;
            }

            /* Minimizar el tamaño de cada figurita en el papel */
            .stickers-grid { 
                grid-template-columns: repeat(5, 1fr) !important; /* Fuerza 5 figuritas por fila dentro de la columna */
                gap: 2px !important; 
            }

            .sticker { 
                padding: 3px 0 !important; 
                font-size: 0.6rem !important; 
                border: 1px solid #ccc !important; 
                border-radius: 2px !important;
                background-color: #fafafa !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title">ÁLBUM MUNDIAL 2026</h1>
        <div class="subtitle" id="main-subtitle">Checklist de figuras</div>
    </header>

    <div class="dashboard-controls">
        <div class="stats">
            <div class="stat-box tengo">Tengo: <span id="count-tengo">0</span></div>
            <div class="stat-box repetida">Repetidas: <span id="count-rep">0</span></div>
            <div class="stat-box falta">Faltan: <span id="count-falta">0</span></div>
        </div>
    </div>
    
    <div class="instructions">💡 <i>Modo de uso: Un toque cambia de estado ( Blanco ➡️ Verde ➡️ Rojo ➡️ Blanco )</i></div>

    <!-- BOTONERA FLOTANTE -->
    <div class="floating-action-container">
        <button class="btn btn-download" onclick="descargarProgreso()">💾 Guardar Web</button>
        <button class="btn btn-pdf" onclick="exportarPDF()">📄 Exportar a PDF</button>
    </div>

    <div class="countries-container" id="main-container">
        <!-- El JS rellenará las secciones automáticamente -->
    </div>

    <script>
        const albumData = [
            { country: "Especiales (FWC)", prefix: "FWC", count: 19 },
            { country: "México (MEX)", prefix: "MEX", count: 20 },
            { country: "Sudáfrica (RSA)", prefix: "RSA", count: 20 },
            { country: "Corea del Sur (KOR)", prefix: "KOR", count: 20 },
            { country: "República Checa (CZE)", prefix: "CZE", count: 20 },
            { country: "Canadá (CAN)", prefix: "CAN", count: 20 },
            { country: "Bosnia y Herzegovina (BIH)", prefix: "BIH", count: 20 },
            { country: "Catar (QAT)", prefix: "QAT", count: 20 },
            { country: "Suiza (SUI)", prefix: "SUI", count: 20 },
            { country: "Brasil (BRA)", prefix: "BRA", count: 20 },
            { country: "Marruecos (MAR)", prefix: "MAR", count: 20 },
            { country: "Haití (HAI)", prefix: "HAI", count: 20 },
            { country: "Escocia (SCO)", prefix: "SCO", count: 20 },
            { country: "Estados Unidos (USA)", prefix: "USA", count: 20 },
            { country: "Paraguay (PAR)", prefix: "PAR", count: 20 },
            { country: "Australia (AUS)", prefix: "AUS", count: 20 },
            { country: "Turquía (TUR)", prefix: "TUR", count: 20 },
            { country: "Alemania (GER)", prefix: "GER", count: 20 },
            { country: "Curazao (CUW)", prefix: "CUW", count: 20 },
            { country: "Costa de Marfil (CIV)", prefix: "CIV", count: 20 },
            { country: "Ecuador (ECU)", prefix: "ECU", count: 20 },
            { country: "Países Bajos (NED)", prefix: "NED", count: 20 },
            { country: "Japón (JPN)", prefix: "JPN", count: 20 },
            { country: "Suecia (SWE)", prefix: "SWE", count: 20 },
            { country: "Túnez (TUN)", prefix: "TUN", count: 20 },
            { country: "Bélgica (BEL)", prefix: "BEL", count: 20 },
            { country: "Egipto (EGY)", prefix: "EGY", count: 20 },
            { country: "Irán (IRN)", prefix: "IRN", count: 20 },
            { country: "Nueva Zelanda (NZL)", prefix: "NZL", count: 20 },
            { country: "España (ESP)", prefix: "ESP", count: 20 },
            { country: "Cabo Verde (CPV)", prefix: "CPV", count: 20 },
            { country: "Arabia Saudita (KSA)", prefix: "KSA", count: 20 },
            { country: "Uruguay (URU)", prefix: "URU", count: 20 },
            { country: "Francia (FRA)", prefix: "FRA", count: 20 },
            { country: "Senegal (SEN)", prefix: "SEN", count: 20 },
            { country: "Irak (IRQ)", prefix: "IRQ", count: 20 },
            { country: "Noruega (NOR)", prefix: "NOR", count: 20 },
            { country: "Argentina (ARG)", prefix: "ARG", count: 20 },
            { country: "Argelia (ALG)", prefix: "ALG", count: 20 },
            { country: "Austria (AUT)", prefix: "AUT", count: 20 },
            { country: "Jordania (JOR)", prefix: "JOR", count: 20 },
            { country: "Portugal (POR)", prefix: "POR", count: 20 },
            { country: "Rep. Dem. del Congo (COD)", prefix: "COD", count: 20 },
            { country: "Uzbekistán (UZB)", prefix: "UZB", count: 20 },
            { country: "Colombia (COL)", prefix: "COL", count: 20 },
            { country: "Inglaterra (ENG)", prefix: "ENG", count: 20 },
            { country: "Croacia (CRO)", prefix: "CRO", count: 20 },
            { country: "Ghana (GHA)", prefix: "GHA", count: 20 },
            { country: "Panamá (PAN)", prefix: "PAN", count: 20 },
            { country: "Coca Cola (CC)", prefix: "CC", count: 14 }
        ];

        const container = document.getElementById('main-container');

        function inicializarStickers() {
            if (container.children.length === 0) {
                albumData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'country-card';
                    
                    const title = document.createElement('div');
                    title.className = 'country-title';
                    title.innerText = item.country;
                    card.appendChild(title);

                    const grid = document.createElement('div');
                    grid.className = 'stickers-grid';

                    for (let i = 1; i <= item.count; i++) {
                        const sticker = document.createElement('div');
                        sticker.className = 'sticker';
                        sticker.innerText = `${item.prefix}${i}`;
                        sticker.setAttribute('data-state', '0'); 
                        
                        vincularEventoToque(sticker);
                        grid.appendChild(sticker);
                    }
                    card.appendChild(grid);
                    container.appendChild(card);
                });
            } else {
                document.querySelectorAll('.sticker').forEach(sticker => {
                    vincularEventoToque(sticker);
                });
            }
        }

        function vincularEventoToque(element) {
            element.addEventListener('click', function() {
                let currentState = parseInt(element.getAttribute('data-state')) || 0;
                let nextState = (currentState + 1) % 3;
                
                setStickerState(element, nextState);
            });
        }

        // Modifica estados visuales y atributos
        function setStickerState(element, state) {
            element.setAttribute('data-state', state);
            element.classList.remove('state-tengo', 'state-repetida');
            
            if (state === 1) element.classList.add('state-tengo');
            if (state === 2) element.classList.add('state-repetida');
            
            actualizarContadores();
        }

        function actualizarContadores() {
            const totalStickers = document.querySelectorAll('.sticker').length;
            const tengo = document.querySelectorAll('.sticker[data-state="1"]').length;
            const repetidas = document.querySelectorAll('.sticker[data-state="2"]').length;
            const faltan = totalStickers - tengo;

            document.getElementById('count-tengo').innerText = tengo;
            document.getElementById('count-rep').innerText = repetidas;
            document.getElementById('count-falta').innerText = faltan;
        }

        function descargarProgreso() {
            const htmlCompleto = document.documentElement.outerHTML;
            const blob = new Blob([htmlCompleto], { type: "text/html;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Mi_Checklist_Mundial_2026.html";
            link.click();
        }

        function exportarPDF() {
            window.print();
        }

        // Ejecución
        inicializarStickers();
        actualizarContadores();
    </script>
</body>
</html>
