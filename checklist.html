<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - Mundial 2026</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #5c061f; /* Color guinda FIFA */
            --tengo-color: #2ecc71;
            --repetida-color: #e74c3c;
            --falta-color: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary-color), #8a0f2e);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin: 0 0 10px 0; font-size: 2rem; }

        /* Panel de Control y Estadísticas */
        .dashboard-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            min-width: 100px;
            border: 1px solid #ddd;
        }
        .stat-box.tengo { background-color: rgba(46, 204, 113, 0.2); color: #27ae60; }
        .stat-box.repetida { background-color: rgba(231, 76, 60, 0.2); color: #c0392b; }
        .stat-box.falta { background-color: rgba(189, 195, 199, 0.2); color: #7f8c8d; }

        .btn-download {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-download:hover { background-color: #3498db; }

        /* Contenedor Principal de Países */
        .countries-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .country-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .country-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 3px solid var(--primary-color);
            color: var(--primary-color);
            display: inline-block;
        }

        /* Grid de Figuritas */
        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
        }

        .sticker {
            background-color: #f0f3f5;
            border: 2px solid #dcdde1;
            border-radius: 6px;
            padding: 10px 5px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }

        /* Estados de las Figuritas */
        .sticker.state-tengo {
            background-color: var(--tengo-color) !important;
            border-color: #27ae60;
            color: white;
        }

        .sticker.state-repetida {
            background-color: var(--repetida-color) !important;
            border-color: #c0392b;
            color: white;
        }

        /* Instrucciones de uso rápido */
        .instructions {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>ÁLBUM MUNDIAL 2026</h1>
        <div>Checklist de figuras</div>
    </header>

    <div class="dashboard-controls">
        <div class="stats">
            <div class="stat-box tengo">Tengo: <span id="count-tengo">0</span></div>
            <div class="stat-box repetida">Repetidas: <span id="count-rep">0</span></div>
            <div class="stat-box falta">Faltan: <span id="count-falta">0</span></div>
        </div>
        <button class="btn-download" onclick="descargarProgreso()">💾 Descargar Estado Actual</button>
    </div>
    <div class="instructions">💡 <i>Tips: 1 Clic = Tengo (Verde) | Doble Clic = Repetida (Rojo) | Clic Derecho o 3er Clic = Resetear</i></div>
    <br>

    <div class="countries-container" id="main-container">
        </div>

    <script>
        // Data estructurada limpia a partir del PDF de control provisto
        const albumData = [
            { country: "Especiales (FWC)", prefix: "FWC", count: 19 },
            { country: "México (MEX)", prefix: "MEX", count: 20 },
            { country: "Sudáfrica (RSA)", prefix: "RSA", count: 20 },
            { country: "Corea del Sur (KOR)", prefix: "KOR", count: 20 },
            { country: "República Checa (CZE)", prefix: "CZE", count: 20 },
            { country: "Canadá (CAN)", prefix: "CAN", count: 20 },
            { country: "Bosnia y Herzegovina (BIH)", prefix: "BIH", count: 20 },
            { country: "Catar (QAT)", prefix: "QAT", count: 20 },
            { country: "Suiza (SUI)", prefix: "SUI", count: 20 },
            { country: "Brasil (BRA)", prefix: "BRA", count: 20 },
            { country: "Marruecos (MAR)", prefix: "MAR", count: 20 },
            { country: "Haití (HAI)", prefix: "HAI", count: 20 },
            { country: "Escocia (SCO)", prefix: "SCO", count: 20 },
            { country: "Estados Unidos (USA)", prefix: "USA", count: 20 },
            { country: "Paraguay (PAR)", prefix: "PAR", count: 20 },
            { country: "Australia (AUS)", prefix: "AUS", count: 20 },
            { country: "Turquía (TUR)", prefix: "TUR", count: 20 },
            { country: "Alemania (GER)", prefix: "GER", count: 20 },
            { country: "Curazao (CUW)", prefix: "CUW", count: 20 },
            { country: "Costa de Marfil (CIV)", prefix: "CIV", count: 20 },
            { country: "Ecuador (ECU)", prefix: "ECU", count: 20 },
            { country: "Países Bajos (NED)", prefix: "NED", count: 20 },
            { country: "Japón (JPN)", prefix: "JPN", count: 20 },
            { country: "Suecia (SWE)", prefix: "SWE", count: 20 },
            { country: "Túnez (TUN)", prefix: "TUN", count: 20 },
            { country: "Bélgica (BEL)", prefix: "BEL", count: 20 },
            { country: "Egipto (EGY)", prefix: "EGY", count: 20 },
            { country: "Irán (IRN)", prefix: "IRN", count: 20 },
            { country: "Nueva Zelanda (NZL)", prefix: "NZL", count: 20 },
            { country: "España (ESP)", prefix: "ESP", count: 20 },
            { country: "Cabo Verde (CPV)", prefix: "CPV", count: 20 },
            { country: "Arabia Saudita (KSA)", prefix: "KSA", count: 20 },
            { country: "Uruguay (URU)", prefix: "URU", count: 20 },
            { country: "Francia (FRA)", prefix: "FRA", count: 20 },
            { country: "Senegal (SEN)", prefix: "SEN", count: 20 },
            { country: "Irak (IRQ)", prefix: "IRQ", count: 20 },
            { country: "Noruega (NOR)", prefix: "NOR", count: 20 },
            { country: "Argentina (ARG)", prefix: "ARG", count: 20 },
            { country: "Argelia (ALG)", prefix: "ALG", count: 20 },
            { country: "Austria (AUT)", prefix: "AUT", count: 20 },
            { country: "Jordania (JOR)", prefix: "JOR", count: 20 },
            { country: "Portugal (POR)", prefix: "POR", count: 20 },
            { country: "Rep. Dem. del Congo (COD)", prefix: "COD", count: 20 },
            { country: "Uzbekistán (UZB)", prefix: "UZB", count: 20 },
            { country: "Colombia (COL)", prefix: "COL", count: 20 },
            { country: "Inglaterra (ENG)", prefix: "ENG", count: 20 },
            { country: "Croacia (CRO)", prefix: "CRO", count: 20 },
            { country: "Ghana (GHA)", prefix: "GHA", count: 20 },
            { country: "Panamá (PAN)", prefix: "PAN", count: 20 },
            { country: "Coca Cola (CC)", prefix: "CC", count: 14 }
        ];

        const container = document.getElementById('main-container');

        // Construir la interfaz de manera dinámica si está vacío (primera carga)
        if (container.children.length === 0) {
            albumData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'country-card';
                
                const title = document.createElement('div');
                title.className = 'country-title';
                title.innerText = item.country;
                card.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'stickers-grid';

                for (let i = 1; i <= item.count; i++) {
                    const sticker = document.createElement('div');
                    sticker.className = 'sticker';
                    sticker.innerText = `${item.prefix}${i}`;
                    // Atributo para controlar los estados (0: Nada, 1: Tengo, 2: Repetida)
                    sticker.setAttribute('data-state', '0'); 
                    
                    // Manejo del sistema de Clics
                    sticker.addEventListener('click', function(e) {
                        // Evitamos que interfiera con el doble clic rápido
                        if (e.detail === 1) {
                            setTimeout(() => {
                                if (sticker.getAttribute('data-state') === '2') return; // Si es dblclick no entra aquí
                                let currentState = parseInt(sticker.getAttribute('data-state'));
                                if (currentState === 0) {
                                    setStickerState(sticker, 1);
                                } else if (currentState === 1) {
                                    // Tercer clic consecutivo simulado o clic normal sobre verde para desmarcar
                                    setStickerState(sticker, 0);
                                }
                            }, 200);
                        }
                    });

                    sticker.addEventListener('dblclick', function() {
                        setStickerState(sticker, 2);
                    });

                    // Clic derecho para desmarcar directo (comodidad para PC)
                    sticker.addEventListener('contextmenu', function(e) {
                        e.preventDefault();
                        setStickerState(sticker, 0);
                    });

                    grid.appendChild(sticker);
                }
                card.appendChild(grid);
                container.appendChild(card);
            });
        } else {
            // Si el archivo ya viene con elementos cargados (archivo descargado previamente),
            // re-vinculamos los eventos a los nodos existentes.
            document.querySelectorAll('.sticker').forEach(sticker => {
                sticker.addEventListener('click', function(e) {
                    if (e.detail === 1) {
                        setTimeout(() => {
                            if (sticker.getAttribute('data-state') === '2') return;
                            let currentState = parseInt(sticker.getAttribute('data-state'));
                            if (currentState === 0) setStickerState(sticker, 1);
                            else if (currentState === 1) setStickerState(sticker, 0);
                        }, 200);
                    }
                });
                sticker.addEventListener('dblclick', function() {
                    setStickerState(sticker, 2);
                });
                sticker.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    setStickerState(sticker, 0);
                });
            });
        }

        // Función para cambiar clases visuales y estados
        function setStickerState(element, state) {
            element.setAttribute('data-state', state);
            element.classList.remove('state-tengo', 'state-repetida');
            
            if (state === 1) element.classList.add('state-tengo');
            if (state === 2) element.classList.add('state-repetida');
            
            actualizarContadores();
        }

        // Calcular estadísticas globales
        function actualizarContadores() {
            const totalStickers = document.querySelectorAll('.sticker').length;
            const tengo = document.querySelectorAll('.sticker[data-state="1"]').length;
            const repetidas = document.querySelectorAll('.sticker[data-state="2"]').length;
            const faltan = totalStickers - tengo;

            document.getElementById('count-tengo').innerText = tengo;
            document.getElementById('count-rep').innerText = repetidas;
            document.getElementById('count-falta').innerText = faltan;
        }

        // Inicializar contadores al cargar la página
        actualizarContadores();

        // Función mágica: Descarga el HTML clonando el estado actual del DOM de forma exacta
        function descargarProgreso() {
            // Forzar que los atributos 'data-state' e 'inline classes' queden grabados en el texto crudo del HTML
            const htmlCompleto = document.documentElement.outerHTML;
            
            const blob = new Blob([htmlCompleto], { type: "text/html;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Mi_Checklist_Mundial_2026.html";
            link.click();
        }
    </script>
</body>
</html>
